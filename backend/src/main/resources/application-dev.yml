spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:learnagent_a3}?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

# Python AI 服务
ai:
  service:
    url: ${AI_SERVICE_URL:http://localhost:8000}
    timeout: 60000

# JWT 配置
jwt:
  secret: ${JWT_SECRET:LearnAgentA3DefaultSecretKeyMustBeAtLeast256Bits!!}
  expiration: 86400000
